<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var t = localStorage.getItem('iflow-theme');
        if (t === 'light') document.documentElement.classList.add('theme-light');
        else if (t === 'dark') document.documentElement.classList.add('theme-dark');
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>flow hub</title>
  </head>
  <body>
    <div id="app">
      <!-- 侧边栏：Agent 列表 -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>flow hub</h1>
          <button id="add-agent-btn" class="btn-primary">+ 添加 Agent</button>
        </div>
        <div class="agent-list" id="agent-list">
          <!-- Agent 列表将在这里动态生成 -->
        </div>
        <div class="session-section">
          <div class="session-section-title">会话历史</div>
          <div class="session-list" id="session-list">
            <div class="session-empty">选择 Agent 后显示会话历史</div>
          </div>
        </div>
        <div class="sidebar-footer">
          <div class="connection-status" id="connection-status">
            <span class="status-dot disconnected"></span>
            <span>未连接</span>
          </div>
          <div class="sidebar-footer-actions">
            <button id="clear-all-sessions" class="btn-text">清除当前 Agent 会话</button>
            <div id="app-version" class="app-version-inline">v--</div>
          </div>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main-content">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
          <div class="current-agent">
            <h2 id="current-agent-name">选择一个 Agent</h2>
            <span id="current-agent-status" class="badge">离线</span>
            <div class="model-selector">
              <button
                id="current-agent-model-btn"
                class="model-selector-btn"
                type="button"
                disabled
                aria-expanded="false"
              >
                <span id="current-agent-model-text">模型：未连接</span>
                <span class="model-selector-caret">▾</span>
              </button>
              <div id="current-agent-model-menu" class="model-selector-menu hidden"></div>
            </div>
          </div>
          <div class="toolbar-actions">
            <button id="theme-toggle-btn" class="btn-icon" title="跟随系统" aria-label="切换主题">◑</button>
            <button id="toggle-think-btn" class="btn-secondary think-toggle-btn" aria-label="切换思考模式" disabled>思考：关</button>
            <button id="open-tool-calls-btn" class="btn-secondary" aria-label="打开工具调用面板">工具调用</button>
            <button id="open-git-changes-btn" class="btn-secondary" aria-label="打开文件变更面板">文件变更</button>
            <button id="new-session-btn" class="btn-secondary" disabled>新建会话</button>
            <button id="clear-chat-btn" class="btn-secondary" disabled>清空当前会话</button>
          </div>
        </header>

        <!-- 对话区域 -->
        <div class="chat-container">
          <div id="chat-messages" class="chat-messages">
            <div class="welcome-message">
              <h3>👋 欢迎使用 flow hub</h3>
              <p>从左侧选择一个 Agent 开始对话，或添加新的 Agent。</p>
            </div>
          </div>

          <!-- 工具调用面板 -->
          <div id="tool-calls-panel" class="tool-calls-panel hidden">
            <div class="tool-calls-header">
              <h4>🔧 工具调用</h4>
              <button id="close-tool-panel" class="btn-icon" aria-label="关闭工具调用面板">×</button>
            </div>
            <div id="tool-calls-list" class="tool-calls-list">
              <!-- 工具调用将在这里显示 -->
            </div>
          </div>

          <div id="git-changes-panel" class="git-changes-panel hidden">
            <div class="git-changes-header">
              <div class="git-changes-title-row">
                <h4>📝 文件变更</h4>
                <span id="git-changes-refresh-time" class="git-changes-refresh-time">未刷新</span>
              </div>
              <div class="git-changes-actions">
                <button id="refresh-git-changes" class="btn-icon" title="刷新文件变更" aria-label="刷新文件变更">↻</button>
                <button id="close-git-panel" class="btn-icon" title="关闭文件变更" aria-label="关闭文件变更面板">×</button>
              </div>
            </div>
            <div id="git-changes-list" class="git-changes-list">
              <!-- 文件变更将在这里显示 -->
            </div>
          </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
          <div class="input-wrapper">
            <div class="composer-pane">
              <div id="slash-command-menu" class="slash-command-menu hidden"></div>
              <textarea 
                id="message-input" 
                placeholder="输入消息..." 
                rows="1"
                disabled
              ></textarea>
            </div>
            <button id="send-btn" class="btn-send" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
          <div class="input-hints">
            <span id="input-status-hint">按 Enter 发送，Shift + Enter 换行</span>
          </div>
        </div>
      </main>
    </div>

    <!-- 添加 Agent 弹窗 -->
    <div id="add-agent-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>添加 iFlow Agent</h3>
          <button id="close-modal" class="btn-icon">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="agent-name">Agent 名称</label>
            <input type="text" id="agent-name" placeholder="我的 iFlow" value="iFlow">
          </div>
          <div class="form-group">
            <label for="iflow-path">iFlow CLI 路径（可选）</label>
            <input type="text" id="iflow-path" placeholder="iflow（使用系统 PATH）">
          </div>
          <div class="form-group">
            <label for="workspace-path">工作目录</label>
            <div class="workspace-path-row">
              <input type="text" id="workspace-path" placeholder="/path/to/workspace" value="/Users/chenweilong/playground">
              <button id="browse-workspace-path" class="btn-secondary btn-compact" type="button">选择文件夹</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="cancel-add-agent" class="btn-secondary">取消</button>
          <button id="confirm-add-agent" class="btn-primary">连接</button>
        </div>
      </div>
    </div>

    <!-- 编辑 Agent 名称弹窗 -->
    <div id="rename-agent-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>编辑 Agent 名称</h3>
          <button id="close-rename-agent-modal" class="btn-icon">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="rename-agent-name">Agent 名称</label>
            <input type="text" id="rename-agent-name" placeholder="请输入 Agent 名称">
          </div>
        </div>
        <div class="modal-footer">
          <button id="cancel-rename-agent" class="btn-secondary">取消</button>
          <button id="confirm-rename-agent" class="btn-primary">保存</button>
        </div>
      </div>
    </div>

    <!-- HTML Artifact 预览弹窗 -->
    <div id="artifact-preview-modal" class="modal hidden">
      <div class="modal-content artifact-preview-modal-content">
        <div class="modal-header">
          <h3>HTML 预览</h3>
          <button id="close-artifact-preview" class="btn-icon">×</button>
        </div>
        <div class="modal-body artifact-preview-meta">
          <div id="artifact-preview-path"></div>
        </div>
        <div class="artifact-preview-body">
          <iframe
            id="artifact-preview-frame"
            class="artifact-preview-frame"
            sandbox="allow-scripts allow-same-origin"
          ></iframe>
        </div>
      </div>
    </div>

    <!-- Git Diff 预览弹窗 -->
    <div id="git-diff-modal" class="modal hidden">
      <div class="modal-content git-diff-modal-content">
        <div class="modal-header">
          <h3 class="git-diff-title">文件 <span id="git-diff-path"></span> Diff</h3>
          <button id="close-git-diff" class="btn-icon" aria-label="关闭 Diff 预览">×</button>
        </div>
        <div class="git-diff-body">
          <pre id="git-diff-content" class="git-diff-content" role="region" aria-label="文件 Diff 内容"></pre>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
